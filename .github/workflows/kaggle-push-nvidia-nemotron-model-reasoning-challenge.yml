name: Push nvidia-nemotron-model-reasoning-challenge Notebook to Kaggle

on:
  push:
    branches:
      - main
    paths:
      - "notebooks/nvidia-nemotron-model-reasoning-challenge/**"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Push notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          export KAGGLE_TOKEN=$KAGGLE_API_TOKEN
          kaggle kernels push -p notebooks/nvidia-nemotron-model-reasoning-challenge
